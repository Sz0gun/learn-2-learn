[tool.poetry]
name = "learn-2-learn"
version = "0.1.0"
description = "Project for processing images and text using Real-ESRGAN and PyTorch"
authors = ["Maksym Viunov <mks.viunov@gmail.com>"]
readme = "README.md"
license = "MIT"

packages = [
    { include = "telegram_bot" }
]

[tool.poetry.dependencies]
python = ">=3.9,<3.13"
Django = "4.2.2"
djangorestframework = "3.14.0"
gunicorn = "20.1.0"
asgiref = "3.8.1"
dj-database-url = "2.2.0"
whitenoise = "6.0.0"
pyrogram = "2.0.106"
python-dotenv = "1.0.0"
openai = "0.28"
click = "8.1.7"
numpy = "1.26.0"
pytz = "2024.1"
opencv-python = "4.7.0.72"
realesrgan = {git = "https://github.com/xinntao/Real-ESRGAN.git"}
torch = {version = "2.0.1", optional = true}
torchvision = {version = "0.15.2", optional = true}
psycopg2-binary = "^2.9.9"
pytest = "^8.3.3"
google-cloud-secret-manager = "^2.20.2"
google-cloud-storage = "^2.18.2"
google-cloud-bigquery = "^3.26.0"
google-cloud-pubsub = "^2.25.2"
google-cloud-vision = "^3.7.4"
fastapi = "^0.115.0"
uvicorn = "^0.31.0"
redis = "^5.1.1"
pydantic = "^2.9.2"
django-redis = "^5.4.0"
cloud-sql-python-connector = "^1.2.0"
httpx = "^0.27.2"
pytest-asyncio = "^0.24.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.3"
fastapi = {extras = ["test"], version = "^0.115.0"}
pytest-asyncio = "^0.24.0"

[tool.black]
line-length = 88
include = '\.pyi?$'
target-version = ['py39']
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
connector = "^1.12.1"
pg8000 = "^1.31.2"

[tool.poetry.extras]
torch_deps = ["torch", "torchvision"]
image_processing = ["basicsr", "facexlib", "gfpgan", "pdf2image", "poppler-utils"]
google_cloud = ["google-cloud-storage"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

