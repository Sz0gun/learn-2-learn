name: Build, Test and Push Docker Image

on:
  push:
    branches: [main, integracja-fastapi-redis]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WIF_PROVIDER: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
  GCP_SERVICE_ACCOUNT: 'my-service-account@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate GCP Project ID
        run: |
          if [[ ! "$GCP_PROJECT_ID" =~ ^[a-z][-a-z0-9]{4,28}[a-z0-9]$ ]]; then
            echo "Invalid GCP Project ID"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Install gcloud SDK
        run: |
          echo "Installing gcloud SDK..."
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Test Docker image (Sanity Check)
        run: |
          docker run -d --name test-container -p 8000:8000 ghcr.io/${{ github.repository }}:${{ github.sha }}
          sleep 10  # Adjust time if necessary for app startup
          curl -f http://localhost:8000/ || { echo "Sanity check failed"; exit 1; }
          docker stop test-container
          docker rm test-container

      - name: Push Docker image to GHCR
        if: ${{ success() }}
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

      - name: Clean up
        if: always()
        run: |
          echo "Performing cleanup tasks..."
          docker system prune -f
