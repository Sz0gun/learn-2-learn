name: Build, Test, and Push Docker Image

on:
  push:
    branches: [main, integracja-fastapi-redis]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate GCP Project ID
        run: |
          if [[ ! "$GCP_PROJECT_ID" =~ ^[a-z][-a-z0-9]{4,28}[a-z0-9]$ ]]; then
            echo "Invalid GCP Project ID"
            exit 1
          fi

      - name: Authenticate to Google Cloud with JSON key
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCS_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry using GHCR_PAT
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GIT_TOKEN }}

      # Start Redis for integration with FastAPI
      - name: Start Redis container
        run: |
          docker run -d --name redis-container -p 6379:6379 redis:alpine

      # Build Docker image, but do not push yet
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false  
          tags: |
            ghcr.io/sz0gun/learn-2-learn:${{ github.sha }}
            ghcr.io/sz0gun/learn-2-learn:latest

      # Sanity Check - test basic functionality
      - name: Run healthcheck (Sanity Check)
        run: |
          docker run -d --name test-container -e REDIS_HOST=redis -p 8000:8000 --link redis-container:redis ghcr.io/sz0gun/learn-2-learn:latest
          sleep 90  # Czekamy na uruchomienie FastAPI
          poetry run python scripts/healthcheck.py || { echo "Sanity check failed"; docker logs test-container; exit 1; }
          docker stop test-container
          docker rm test-container

      # Run full tests inside Docker container
      - name: Run full test suite
        run: |
          docker run --name test-container ghcr.io/sz0gun/learn-2-learn:latest pytest tests/
          docker stop test-container
          docker rm test-container

      # Push Docker image to GHCR if tests succeed
      - name: Push Docker image to GHCR
        if: ${{ success() }}  # Obraz wypchnie się tylko, jeśli testy przejdą
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sz0gun/learn-2-learn:${{ github.sha }}
            ghcr.io/sz0gun/learn-2-learn:latest

      - name: Clean up Docker resources
        if: always()
        run: docker system prune -f
